---

# apply prerequisites per documentation

# We are patching to latest
- name: "Ensure the system is up to date" # noqa package-latest
  ansible.builtin.dnf:
    name: "*"
    state: latest

- name: "Ensure required packages are installed"
  ansible.builtin.dnf:
    name:
      - qemu-kvm
      - libvirt
      - virt-install
      - cyrus-sasl-gssapi
      - libvirt-daemon-config-network
      - libvirt-daemon-kvm
    state: present

- name: "Ensure firewalld ports"
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "libvirt-tls"
    - "libvirt"

- name: "Determine the boot command line"
  ansible.builtin.slurp:
    src: /proc/cmdline
  register: file_content

- name: "Determine if iommu is on"
  when: "'intel_iommu=on' in (file_content.content | b64decode)"
  ansible.builtin.set_fact:
    iommu_on: true

- name: "Ensure intel_iommu=on in kernel cmdline arguments"
  when: not iommu_on
  ansible.builtin.command: "grubby --update-kernel=DEFAULT --args='intel_iommu=on'"
  register: grubby_out
  changed_when: grubby_out.rc == 0

- name: "Update GRUB"
  when: not iommu_on
  ansible.builtin.command: "grub2-mkconfig -o /boot/grub2/grub.cfg"
  register: grub_out
  changed_when: grub_out.rc == 0

- name: "Reboot and wait"
  when: not iommu_on
  ansible.builtin.reboot:
    post_reboot_delay: 15

- name: "Ensure system services are enabled and started"
  ansible.builtin.systemd_service:
    name: "{{ virtualization_service }}"
    enabled: true
    state: started
  loop:
    - virtqemud.socket
    - virtqemud-ro.socket
    - virtqemud-admin.socket
    - virtnetworkd.socket
    - virtnetworkd-ro.socket
    - virtnetworkd-admin.socket
    - virtnodedevd.socket
    - virtnodedevd-ro.socket
    - virtnodedevd-admin.socket
    - virtnwfilterd.socket
    - virtnwfilterd-ro.socket
    - virtnwfilterd-admin.socket
    - virtsecretd.socket
    - virtsecretd-ro.socket
    - virtsecretd-admin.socket
    - virtstoraged.socket
    - virtstoraged-ro.socket
    - virtstoraged-admin.socket
    - libvirtd-tls.socket
  loop_control:
    loop_var: virtualization_service

- name: "Validate virtualization services"
  ansible.builtin.command: "virt-host-validate"
  register: kvm_host_validate
  changed_when: kvm_host_validate.rc == 0

- name: "Validate results"
  ansible.builtin.debug:
    var: kvm_host_validate

- name: "Assertion"
  ansible.builtin.assert:
    that:
      - not "FAIL" in kvm_host_validate.stdout
    fail_msg: "Please see debug validate results above for specific failures or warnings"

...
