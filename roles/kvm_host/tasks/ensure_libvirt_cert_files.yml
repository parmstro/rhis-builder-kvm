---

# link to the default directories

- name: "Create the required directories"
  ansible.builtin.file:
    name: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - path: "/etc/pki/CA/"
    - path: "/etc/pki/libvirt/"
    - path: "/etc/pki/libvirt/private/"

- name: "Copy server certificate to the proper directories"
  ansible.builtin.copy:
    src: "{{ libvirt_server_crt_path }}"
    dest: "/etc/pki/libvirt/servercert.pem"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: "Copy server key to the proper directories"
  ansible.builtin.copy:
    src: "{{ libvirt_server_key_path }}"
    dest: "/etc/pki/libvirt/private/serverkey.pem"
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: "Copy client certificate to the proper directories"
  ansible.builtin.copy:
    src: "{{ libvirt_client_crt_path }}"
    dest: "/etc/pki/libvirt/clientcert.pem"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: "Copy client key to the proper directories"
  ansible.builtin.copy:
    src: "{{ libvirt_client_key_path }}"
    dest: "/etc/pki/libvirt/private/clientkey.pem"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: "Copy the IPA CA crt to the libvirt CA directory"
  ansible.builtin.copy:
    src: "/etc/ipa/ca.crt"
    dest: "/etc/pki/CA/cacert.pem"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: "Validate the libvirt pki configuration"
  ansible.builtin.command: "virt-pki-validate"
  register: vpv_result
  changed_when: vpv_result.rc == 0

- name: "Validation output"
  ansible.builtin.debug:
    var: vpv_result.stdout

- name: "Assertion"
  ansible.builtin.assert:
    that: not "FAILED" in vpv_result.stdout
    fail_msg: "One or more configuration items failed checks"

...
