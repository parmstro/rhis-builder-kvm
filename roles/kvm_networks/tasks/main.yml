---

- name: Get all network interfaces with active links
  ansible.builtin.shell: |
    set -o pipefail
    ip -o link show | grep 'state UP' | awk -F': ' '{print $2}' | grep -v '^lo$'
  register: kvm_networks_active_interfaces
  changed_when: false

- name: Get primary interface MAC address
  ansible.builtin.set_fact:
    kvm_networks_primary_mac: "{{ host.mac | lower }}"

- name: Find primary interface name by MAC address
  ansible.builtin.shell: |
    set -o pipefail
    ip -o link show | grep -i "{{ kvm_networks_primary_mac }}" | awk -F': ' '{print $2}'
  register: kvm_networksprimary_interface
  changed_when: false

- name: Select second NIC with active link for bridge
  when: active_interfaces.stdout_lines | length > 1
  ansible.builtin.set_fact:
    kvm_networks_physical_interface: "{{ (active_interfaces.stdout_lines | reject('search', kvm_networksprimary_interface.stdout) | list)[0] }}"

- name: Display selected interface for bridge
  ansible.builtin.debug:
    msg:
      - "Primary interface (kickstart): {{ kvm_networks_primary_interface.stdout }}"
      - "Bridge interface (libvirt): {{ kvm_networks_physical_interface }}"

- name: Get existing connections on physical interface
  ansible.builtin.shell: |
    set -o pipefail
    nmcli -t -f NAME,DEVICE connection show | grep ":{{ kvm_networks_physical_interface }}$" | cut -d: -f1
  register: existing_connections
  changed_when: false
  failed_when: false

- name: Delete existing connections on physical interface
  ansible.builtin.command: nmcli connection delete "{{ item }}"
  loop: "{{ existing_connections.stdout_lines }}"
  when: existing_connections.stdout_lines | length > 0
  changed_when: true

- name: Create bridge connection
  community.general.nmcli:
    type: bridge
    conn_name: "{{ libvirt_bridge_name }}"
    ifname: "{{ libvirt_bridge_name }}"
    state: present
    autoconnect: true
    stp: false
    method4: disabled
    method6: disabled
  register: bridge_created

- name: Add physical interface as bridge slave
  community.general.nmcli:
    type: ethernet
    conn_name: "{{ libvirt_bridge_name }}-slave"
    ifname: "{{ physical_interface }}"
    master: "{{ libvirt_bridge_name }}"
    slave_type: bridge
    state: present
    autoconnect: true
  register: slave_added

- name: Bring up bridge connection
  ansible.builtin.command: nmcli connection up {{ libvirt_bridge_name }}
  when: bridge_created.changed or slave_added.changed
  changed_when: true

- name: Wait for bridge to be active
  ansible.builtin.wait_for:
    timeout: 10
  when: bridge_created.changed or slave_added.changed

- name: Check if libvirt bridge network exists
  ansible.builtin.command: virsh net-info {{ libvirt_network_name }}
  register: network_check
  failed_when: false
  changed_when: false

- name: Define libvirt bridge network
  community.libvirt.virt_net:
    command: define
    name: "{{ libvirt_network_name }}"
    xml: |
      <network>
        <name>{{ libvirt_network_name }}</name>
        <forward mode='bridge'/>
        <bridge name='{{ libvirt_bridge_name }}'/>
      </network>
  when: network_check.rc != 0

- name: Start libvirt network
  community.libvirt.virt_net:
    name: "{{ libvirt_network_name }}"
    state: active

- name: Enable autostart for libvirt network
  ansible.builtin.command: virsh net-autostart {{ libvirt_network_name }}
  register: net_autostart
  changed_when: "'marked as autostarted' in net_autostart.stdout or 'autostart' in net_autostart.stdout"
  failed_when: net_autostart.rc != 0 and 'already' not in net_autostart.stderr

# Storage pool creation moved to setup_raid.yml
# Dual pools created based on VM volume_mode requirements:
#  - nvme_pool_fs (dir type) for volume_mode: filesystem
#  - nvme_pool_block (logical type) for volume_mode: block

- name: Configure firewall for libvirt
  ansible.posix.firewalld:
    zone: public
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - libvirt
    - libvirt-tls
  failed_when: false

- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: true
    state: present
    reload: true
...
